<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verbi in cucina · Vocabulary Cards</title>
<style>
:root {
  --bg:#eee8dc; --ink:#24180f; --muted:#81786e; --card:#fffaf1;
  --yellow:#eee39b; --blue:#c9eee7; --green:#e9f8e3; --pink:#fff0f1;
  --red:#b94747; --line:rgba(36,24,15,.14); --shadow:0 18px 45px rgba(36,24,15,.13);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
.app{max-width:880px;margin:0 auto;padding:44px 28px 34px}
header{display:flex;justify-content:space-between;gap:24px;align-items:flex-start;margin-bottom:34px}
h1,h2,.serif{font-family:Georgia,"Times New Roman",serif;letter-spacing:-.045em}
h1{font-size:clamp(42px,8vw,72px);line-height:.86;margin:0}
.meta{font-size:20px;line-height:1.55;text-align:right;color:var(--muted);font-weight:650}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:0 0 32px}
.tab{border:0;border-radius:999px;padding:16px 18px;background:transparent;color:var(--muted);font-weight:900;font-size:19px;cursor:pointer}
.tab.active{background:var(--ink);color:white;box-shadow:var(--shadow)}
.panel{display:none} .panel.active{display:block}
.row{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-weight:800;font-size:19px;margin:0 0 10px}
.progress{height:13px;border-radius:999px;background:rgba(36,24,15,.13);overflow:hidden}
.progress>div{height:100%;background:var(--ink);width:0%;transition:.25s}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:26px 0}
.stat{background:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.6);border-radius:17px;text-align:center;padding:18px}
.stat b{display:block;font:900 38px/1 Georgia,serif} .stat span{color:var(--muted);font-weight:800}
.card{background:var(--yellow);border:2px solid rgba(110,100,30,.17);border-radius:28px;min-height:425px;padding:42px;box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}
.top{display:flex;justify-content:space-between;gap:14px;align-items:center;color:var(--muted);font-weight:900;letter-spacing:.1em;text-transform:uppercase}
.badge{background:rgba(255,255,255,.3);padding:8px 13px;border-radius:999px;font-size:13px}
.term{font:900 clamp(42px,8vw,76px)/.98 Georgia,serif;letter-spacing:-.06em;margin:42px 0 8px}
.pos{font:italic 25px Georgia,serif;color:var(--muted);margin-bottom:17px}
.chunk{display:inline-block;background:rgba(255,255,255,.28);border-radius:11px;padding:10px 15px;color:#625947;font-weight:750}
.back{border-top:1px solid var(--line);margin-top:28px;padding-top:25px}
.translation{font:900 clamp(28px,4.5vw,40px)/1.12 Georgia,serif;margin-bottom:16px}
.example{font-size:20px;line-height:1.5;color:#5e574e;font-style:italic}
.controls{display:grid;grid-template-columns:1fr 110px 1fr;gap:14px;margin-top:24px}
.btn{border:0;border-radius:17px;background:rgba(255,255,255,.78);padding:18px;font-weight:950;font-size:18px;cursor:pointer;color:var(--ink)}
.btn.dark{background:var(--ink);color:white} .btn.red{background:var(--pink);color:var(--red);border:1px solid #efc7cc}
.learnBtns{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.quizCard{background:var(--blue);border:2px solid rgba(20,110,100,.15);border-radius:28px;padding:42px;box-shadow:var(--shadow);margin:26px 0}
.label{color:var(--muted);font-weight:950;letter-spacing:.13em;text-transform:uppercase;margin-bottom:28px}
.sentence{font:900 clamp(31px,5.5vw,52px)/1.34 Georgia,serif;letter-spacing:-.045em}
.blank{display:inline-block;min-width:280px;border-bottom:4px solid rgba(36,24,15,.28);text-align:center;color:rgba(36,24,15,.35)}
.options{display:flex;flex-wrap:wrap;gap:12px;background:rgba(255,255,255,.47);border-radius:19px;padding:18px;margin-bottom:18px}
.option{border:0;border-radius:13px;background:#fffaf4;padding:12px 17px;font-weight:900;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.option.correct{outline:3px solid #84c894} .option.wrong{outline:3px solid #e59b9b}
.feedback{min-height:28px;color:var(--muted);font-weight:850;margin:8px 0 18px}
.list{background:rgba(255,255,255,.58);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}
.item{padding:27px 32px;border-bottom:1px solid var(--line)} .item:last-child{border-bottom:0}
.itemTitle{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.itemTerm{font:900 31px Georgia,serif;background:#c8efc4;border-radius:10px;padding:2px 10px}
.posTag{border:1px solid var(--line);border-radius:9px;padding:5px 9px;color:var(--muted);font-size:13px;font-weight:950;letter-spacing:.09em;text-transform:uppercase}
.item p{font-size:19px;line-height:1.48;margin:8px 0}
.exportTitle{font-size:48px;margin:0 0 12px}
.note{background:rgba(255,255,255,.5);border-radius:18px;padding:18px;color:var(--muted);font-weight:700;line-height:1.5;margin-bottom:18px}
.exportGrid{display:grid;gap:16px}
.exportBtn{border:0;background:rgba(255,255,255,.72);border-radius:18px;padding:24px 28px;display:grid;grid-template-columns:48px 1fr;align-items:center;text-align:left;font-weight:950;font-size:25px;cursor:pointer}
.exportBtn small{display:block;color:var(--muted);font-size:16px;margin-top:4px}
textarea{width:100%;min-height:185px;margin-top:20px;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.6);padding:18px;font:15px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace}
.editor{background:rgba(255,255,255,.55);border-radius:22px;padding:20px;margin-top:20px}
.editor textarea{margin-top:10px;min-height:135px}
@media(max-width:650px){
 .app{padding:30px 18px} header{display:block} .meta{text-align:left;margin-top:18px}
 .tabs{gap:8px} .tab{font-size:14px;padding:12px 8px}
 .card,.quizCard{padding:26px;min-height:390px} .controls{grid-template-columns:1fr}
 .stats{grid-template-columns:repeat(3,1fr);gap:8px} .stat{padding:14px 8px}
 .blank{min-width:180px}
}
</style>
</head>
<body>
<main class="app">
<header>
  <h1>Vocabulary<br>Cards</h1>
  <div class="meta"><div>Verbi in cucina</div><div><span id="count"></span> words · <span id="rounds"></span> quiz rounds</div></div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="cards">Cards</button>
  <button class="tab" data-tab="quiz">Quiz</button>
  <button class="tab" data-tab="list">List</button>
  <button class="tab" data-tab="export">Export</button>
</div>

<section class="panel active" id="cards">
  <div class="row"><span id="posNow"></span><span id="percent"></span></div>
  <div class="progress"><div id="bar"></div></div>
  <div class="stats"><div class="stat"><b id="total"></b><span>Total</span></div><div class="stat"><b id="known">0</b><span>Known</span></div><div class="stat"><b id="review">0</b><span>Review</span></div></div>
  <article class="card" id="card">
    <div>
      <div class="top"><span id="num"></span><span class="badge" id="pos1"></span></div>
      <div class="term" id="term"></div>
      <div class="pos" id="pos2"></div>
      <div class="chunk" id="chunk"></div>
      <div class="back" id="back" hidden>
        <div class="translation" id="translation"></div>
        <div class="example" id="example"></div>
      </div>
    </div>
    <div class="top"><span></span><span id="hint">☝ tap to flip</span></div>
  </article>
  <div class="controls">
    <button class="btn" id="prev">← Prev</button>
    <button class="btn" id="shuffle">⤨</button>
    <button class="btn" id="next">Next →</button>
  </div>
  <div class="learnBtns">
    <button class="btn red" id="markReview">× Still learning</button>
    <button class="btn dark" id="markKnown">✓ Got it!</button>
  </div>
</section>

<section class="panel" id="quiz">
  <div class="row"><span id="quizNow"></span><span id="score"></span></div>
  <div class="progress"><div id="quizBar"></div></div>
  <div class="quizCard"><div class="label">Fill in the blank</div><div class="sentence" id="sentence"></div></div>
  <div class="options" id="options"></div>
  <div class="feedback" id="feedback"></div>
  <div class="learnBtns"><button class="btn red" id="skip">▷ Skip</button><button class="btn dark" id="nextQuiz">✓ Next</button></div>
</section>

<section class="panel" id="list">
  <div class="list" id="listBox"></div>
</section>

<section class="panel" id="export">
  <h2 class="serif exportTitle">Export</h2>
  <div class="note">Выгрузи слова в Anki или Quizlet одним кликом. Работает локально: это обычный HTML-файл.</div>
  <div class="exportGrid">
    <button class="exportBtn" id="anki">📄 <span>Anki <small>скачать .txt → File → Import в Anki</small></span></button>
    <button class="exportBtn" id="quizlet">📋 <span>Quizlet <small>скопировать → Create → Import</small></span></button>
    <button class="exportBtn" id="csv">▦ <span>CSV <small>универсальный формат</small></span></button>
  </div>
  <textarea id="exportText" placeholder="Здесь появится экспорт..."></textarea>
  <div class="editor">
    <b>Быстро заменить слова</b>
    <div class="note" style="margin:10px 0 0">Формат: italiano | русский перевод | пример на итальянском</div>
    <textarea id="quickInput">cucinare | готовить | Mi piace cucinare la pasta.
tagliare | резать | Taglia le verdure.
aggiungere | добавлять | Aggiungi un po' di sale.</textarea>
    <button class="btn dark" id="loadQuick" style="margin-top:12px">Загрузить эти слова</button>
  </div>
</section>
</main>

<script>
let vocab = [{"term": "cucinare", "pos": "verbo", "translation": "готовить", "definition": "preparare il cibo usando il calore o seguendo una ricetta", "chunk": "cucinare la pasta / cucinare per gli amici", "example": "La domenica mi piace cucinare qualcosa di speciale.", "quiz": "La domenica mi piace _____ qualcosa di speciale.", "answer": "cucinare", "wrong": ["lavare", "versare", "assaggiare"]}, {"term": "preparare", "pos": "verbo", "translation": "подготавливать; готовить", "definition": "organizzare o fare qualcosa prima di usarla o servirla", "chunk": "preparare la cena / preparare gli ingredienti", "example": "Prima di iniziare, preparo tutti gli ingredienti.", "quiz": "Prima di iniziare, _____ tutti gli ingredienti.", "answer": "preparo", "wrong": ["friggo", "bollo", "grattugio"]}, {"term": "tagliare", "pos": "verbo", "translation": "резать", "definition": "dividere qualcosa in parti usando un coltello", "chunk": "tagliare il pane / tagliare le verdure", "example": "Taglia le verdure a pezzetti piccoli.", "quiz": "_____ le verdure a pezzetti piccoli.", "answer": "Taglia", "wrong": ["Versa", "Lava", "Assaggia"]}, {"term": "affettare", "pos": "verbo", "translation": "нарезать ломтиками", "definition": "tagliare qualcosa in fette sottili", "chunk": "affettare il pane / affettare il prosciutto", "example": "Puoi affettare il pane per favore?", "quiz": "Puoi _____ il pane per favore?", "answer": "affettare", "wrong": ["bollire", "condire", "impastare"]}, {"term": "sbucciare", "pos": "verbo", "translation": "чистить от кожуры", "definition": "togliere la buccia da frutta o verdura", "chunk": "sbucciare una mela / sbucciare le patate", "example": "Devo sbucciare le patate prima di cuocerle.", "quiz": "Devo _____ le patate prima di cuocerle.", "answer": "sbucciare", "wrong": ["tritare", "versare", "friggere"]}, {"term": "lavare", "pos": "verbo", "translation": "мыть", "definition": "pulire qualcosa con acqua", "chunk": "lavare l'insalata / lavare la frutta", "example": "Lava bene l'insalata prima di mangiarla.", "quiz": "_____ bene l'insalata prima di mangiarla.", "answer": "Lava", "wrong": ["Friggi", "Informa", "Grattugia"]}, {"term": "aggiungere", "pos": "verbo", "translation": "добавлять", "definition": "mettere un ingrediente in più dentro una preparazione", "chunk": "aggiungere sale / aggiungere olio", "example": "Aggiungi un po' di sale nell'acqua.", "quiz": "_____ un po' di sale nell'acqua.", "answer": "Aggiungi", "wrong": ["Assaggia", "Taglia", "Lava"]}, {"term": "mescolare", "pos": "verbo", "translation": "перемешивать", "definition": "muovere gli ingredienti insieme con un cucchiaio o una spatola", "chunk": "mescolare la salsa / mescolare bene", "example": "Mescola bene il sugo con un cucchiaio.", "quiz": "_____ bene il sugo con un cucchiaio.", "answer": "Mescola", "wrong": ["Cuoci", "Sbuccia", "Inforna"]}, {"term": "mettere", "pos": "verbo", "translation": "класть; ставить", "definition": "posizionare qualcosa in un posto", "chunk": "mettere in forno / mettere sul tavolo", "example": "Metti la torta in forno per venti minuti.", "quiz": "_____ la torta in forno per venti minuti.", "answer": "Metti", "wrong": ["Bolli", "Trita", "Condisci"]}, {"term": "versare", "pos": "verbo", "translation": "наливать", "definition": "far passare un liquido da un contenitore a un altro", "chunk": "versare l'acqua / versare il latte", "example": "Versa il latte nella ciotola.", "quiz": "_____ il latte nella ciotola.", "answer": "Versa", "wrong": ["Taglia", "Sbuccia", "Friggi"]}, {"term": "cuocere", "pos": "verbo", "translation": "готовить термически; варить/печь/жарить", "definition": "preparare un alimento con il calore", "chunk": "cuocere la pasta / cuocere in padella", "example": "La pasta deve cuocere per dieci minuti.", "quiz": "La pasta deve _____ per dieci minuti.", "answer": "cuocere", "wrong": ["lavare", "sbucciare", "tritare"]}, {"term": "bollire", "pos": "verbo", "translation": "кипятить; варить", "definition": "cuocere in acqua molto calda che fa bolle", "chunk": "bollire l'acqua / bollire le patate", "example": "Fai bollire l'acqua prima di mettere la pasta.", "quiz": "Fai _____ l'acqua prima di mettere la pasta.", "answer": "bollire", "wrong": ["affettare", "condire", "grattugiare"]}, {"term": "friggere", "pos": "verbo", "translation": "жарить во фритюре/на масле", "definition": "cuocere in olio caldo", "chunk": "friggere le patate / friggere in padella", "example": "Non voglio friggere le patate, preferisco farle al forno.", "quiz": "Non voglio _____ le patate, preferisco farle al forno.", "answer": "friggere", "wrong": ["lavare", "versare", "impastare"]}, {"term": "arrostire", "pos": "verbo", "translation": "запекать; жарить", "definition": "cuocere al forno o sul fuoco fino a rendere il cibo dorato", "chunk": "arrostire il pollo / verdure arrosto", "example": "Possiamo arrostire le verdure con olio e rosmarino.", "quiz": "Possiamo _____ le verdure con olio e rosmarino.", "answer": "arrostire", "wrong": ["sbucciare", "bollire", "mescolare"]}, {"term": "infornare", "pos": "verbo", "translation": "ставить в духовку", "definition": "mettere un alimento nel forno", "chunk": "infornare la pizza / infornare una torta", "example": "Quando il forno è caldo, puoi infornare la pizza.", "quiz": "Quando il forno è caldo, puoi _____ la pizza.", "answer": "infornare", "wrong": ["lavare", "tagliare", "assaggiare"]}, {"term": "condire", "pos": "verbo", "translation": "заправлять; приправлять", "definition": "aggiungere olio, sale, spezie o salsa a un piatto", "chunk": "condire l'insalata / condire la pasta", "example": "Condisci l'insalata con olio e aceto.", "quiz": "_____ l'insalata con olio e aceto.", "answer": "Condisci", "wrong": ["Impasta", "Bolli", "Sbuccia"]}, {"term": "assaggiare", "pos": "verbo", "translation": "пробовать на вкус", "definition": "provare un po' di cibo per sentire il sapore", "chunk": "assaggiare il sugo / assaggiare un piatto", "example": "Assaggia il sugo: forse manca un po' di sale.", "quiz": "_____ il sugo: forse manca un po' di sale.", "answer": "Assaggia", "wrong": ["Trita", "Versa", "Inforna"]}, {"term": "impastare", "pos": "verbo", "translation": "замешивать тесто", "definition": "lavorare farina, acqua e altri ingredienti per fare un impasto", "chunk": "impastare la pizza / impastare il pane", "example": "Per fare la pizza bisogna impastare farina, acqua e lievito.", "quiz": "Per fare la pizza bisogna _____ farina, acqua e lievito.", "answer": "impastare", "wrong": ["grattugiare", "friggere", "versare"]}, {"term": "grattugiare", "pos": "verbo", "translation": "натирать", "definition": "ridurre un alimento in piccoli pezzi usando una grattugia", "chunk": "grattugiare il formaggio / grattugiare la carota", "example": "Grattugia un po' di parmigiano sulla pasta.", "quiz": "_____ un po' di parmigiano sulla pasta.", "answer": "Grattugia", "wrong": ["Lava", "Bolli", "Affetta"]}, {"term": "tritare", "pos": "verbo", "translation": "измельчать; мелко резать", "definition": "tagliare in pezzi molto piccoli", "chunk": "tritare la cipolla / tritare il prezzemolo", "example": "Trita la cipolla finemente.", "quiz": "_____ la cipolla finemente.", "answer": "Trita", "wrong": ["Versa", "Cuoci", "Condisci"]}];
let index=0, flipped=false, known=new Set(), review=new Set();
let quizIndex=0, correct=0, wrong=0, locked=false;
const $ = id => document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function init(){
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));
  $('card').onclick=()=>{flipped=!flipped; renderCard()};
  $('next').onclick=()=>move(1); $('prev').onclick=()=>move(-1);
  $('shuffle').onclick=()=>{index=Math.floor(Math.random()*vocab.length); flipped=false; renderCard()};
  $('markKnown').onclick=()=>{known.add(vocab[index].term); review.delete(vocab[index].term); move(1)};
  $('markReview').onclick=()=>{review.add(vocab[index].term); known.delete(vocab[index].term); move(1)};
  $('skip').onclick=()=>{wrong++; quizIndex++; locked=false; renderQuiz()};
  $('nextQuiz').onclick=()=>{quizIndex++; locked=false; renderQuiz()};
  $('anki').onclick=()=>exportData('anki'); $('quizlet').onclick=()=>exportData('quizlet'); $('csv').onclick=()=>exportData('csv');
  $('loadQuick').onclick=loadQuick;
  refresh();
}
function showTab(id){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===id))}
function refresh(){$('count').textContent=vocab.length; $('rounds').textContent=vocab.length*5; $('total').textContent=vocab.length; renderCard(); renderQuiz(); renderList()}
function move(d){index=(index+d+vocab.length)%vocab.length; flipped=false; renderCard()}
function renderCard(){
 const v=vocab[index], pct=Math.round(((index+1)/vocab.length)*100);
 $('posNow').textContent=`${index+1} / ${vocab.length}`; $('percent').textContent=pct+'%'; $('bar').style.width=pct+'%';
 $('known').textContent=known.size; $('review').textContent=review.size;
 $('num').textContent=String(index+1).padStart(2,'0'); $('pos1').textContent=v.pos; $('term').textContent=v.term; $('pos2').textContent=v.pos; $('chunk').textContent=v.chunk||v.definition;
 $('translation').textContent=v.translation; $('example').textContent='“'+v.example+'”'; $('back').hidden=!flipped; $('hint').textContent=flipped?'tap to hide':'☝ tap to flip';
}
function renderQuiz(){
 const v=vocab[quizIndex%vocab.length], total=vocab.length*5, pct=Math.min(100,Math.round(((quizIndex+1)/total)*100));
 $('quizNow').textContent=`${quizIndex+1} / ${total}`; $('score').textContent=`✓ ${correct} · × ${wrong}`; $('quizBar').style.width=pct+'%'; $('feedback').textContent='';
 $('sentence').innerHTML=esc(v.quiz).replace('_____', '<span class="blank">?</span>');
 let opts=[v.answer,...(v.wrong||[])].filter(Boolean);
 while(opts.length<4){let c=vocab[Math.floor(Math.random()*vocab.length)].term;if(!opts.includes(c))opts.push(c)}
 opts=opts.slice(0,4).sort(()=>Math.random()-.5); $('options').innerHTML='';
 opts.forEach(o=>{let b=document.createElement('button'); b.className='option'; b.textContent=o; b.onclick=()=>check(b,o,v.answer); $('options').appendChild(b)})
}
function check(btn,opt,ans){if(locked)return; locked=true; if(opt===ans){btn.classList.add('correct');correct++;$('feedback').textContent='Верно!'}else{btn.classList.add('wrong');wrong++;$('feedback').textContent='Правильный ответ: '+ans; [...$('options').children].forEach(x=>{if(x.textContent===ans)x.classList.add('correct')})} $('score').textContent=`✓ ${correct} · × ${wrong}`}
function renderList(){$('listBox').innerHTML=vocab.map(v=>`<div class="item"><div class="itemTitle"><span class="itemTerm">${esc(v.term)}</span><span class="posTag">${esc(v.pos)}</span></div><p><b>${esc(v.translation)}</b></p><p><i>${esc(v.example)}</i></p><p class="chunk">${esc(v.chunk||'')}</p></div>`).join('')}
function exportData(type){let text='', name='vocabulary.txt'; if(type==='anki'){text=vocab.map(v=>`${v.term}\t${v.translation}\t${v.example}\t${v.chunk}`).join('\n'); name='verbi-cucina-anki.txt'; download(name,text)} if(type==='quizlet'){text=vocab.map(v=>`${v.term}\t${v.translation} — ${v.example}`).join('\n'); navigator.clipboard&&navigator.clipboard.writeText(text)} if(type==='csv'){text=['term,pos,translation,definition,chunk,example',...vocab.map(v=>[v.term,v.pos,v.translation,v.definition,v.chunk,v.example].map(csv).join(','))].join('\n'); name='verbi-cucina.csv'; download(name,text)} $('exportText').value=text}
function csv(x){return '"'+String(x||'').replaceAll('"','""')+'"'}
function download(name,text){const blob=new Blob([text],{type:'text/plain;charset=utf-8'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000)}
function loadQuick(){const lines=$('quickInput').value.split('\n').map(x=>x.trim()).filter(Boolean); vocab=lines.map((line,i)=>{const [term,tr,ex]=line.split('|').map(x=>(x||'').trim()); return {term,pos:'verbo',translation:tr||'',definition:'',chunk:term+' qualcosa',example:ex||'',quiz:(ex||('Devo '+term+' qualcosa.')).replace(term,'_____'),answer:term,wrong:[]}}); index=0; quizIndex=0; known=new Set(); review=new Set(); correct=0; wrong=0; locked=false; flipped=false; refresh(); showTab('cards')}
init();
</script>
