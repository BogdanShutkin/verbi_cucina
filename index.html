<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Bogdano Italiano cards</title>
<style>
:root{
  --bg:#fffdf9;--ink:#17120f;--muted:#746f68;--pink:#cf1f66;
  --red:#c62845;--green:#2e8b57;--yellow:#ffd82e;--blue:#41a5ea;
  --line:rgba(23,18,15,.14);--shadow:0 10px 24px rgba(23,18,15,.08);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}
body{display:flex;justify-content:center}
.app{width:min(1160px,100%);height:100dvh;padding:clamp(8px,1.3vh,16px) clamp(10px,3vw,34px);display:grid;grid-template-rows:auto auto auto 1fr auto;gap:clamp(6px,1vh,10px)}

.header{display:grid;grid-template-columns:1fr auto;align-items:start;gap:12px}
h1{font:950 clamp(27px,4.8vw,52px)/.88 Georgia,serif;letter-spacing:-.04em;margin:0}
.topic{font:950 clamp(18px,2.7vw,29px)/1 Georgia,serif;color:var(--pink);margin-top:4px}
.dots{display:flex;gap:9px;padding-top:4px}
.dots i{width:19px;height:19px;border-radius:50%;display:block}
.dots i:nth-child(1){background:#2f8f47}.dots i:nth-child(2){background:#fff;border:1px solid #ddd}.dots i:nth-child(3){background:#d8232a}

.meta{display:flex;justify-content:space-between;color:var(--muted);font-weight:900;font-size:clamp(12px,1.7vw,16px)}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.tab{border:0;border-radius:999px;background:transparent;color:var(--muted);font-weight:950;padding:clamp(8px,1.4vh,13px) 6px;font-size:clamp(13px,1.8vw,17px);cursor:pointer}
.tab.active{background:var(--ink);color:#fff;box-shadow:var(--shadow)}

.panel{display:none;min-height:0}
.panel.active{display:grid;grid-template-rows:auto auto 1fr auto auto;gap:clamp(6px,1vh,10px);min-height:0}
.progress{height:8px;border-radius:999px;background:#e6dfd3;overflow:hidden}
.progress>div{height:100%;background:var(--ink);width:0%;border-radius:999px;transition:.2s}

.counters{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.counter{border:1px solid #eee8de;background:#fff;border-radius:15px;min-height:clamp(42px,8vh,72px);display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 5px 12px rgba(23,18,15,.04);cursor:pointer;font-weight:950;color:var(--muted)}
.counter b{font:950 clamp(22px,4.5vw,32px)/1 Georgia,serif;color:var(--ink)}
.counter.active{outline:3px solid var(--yellow)}
#knownCount{color:var(--green)} #reviewCount{color:var(--red)}

.stage{perspective:1200px;min-height:0;display:flex;align-items:center}
.flip{position:relative;width:100%;height:88%;min-height:190px;transform-style:preserve-3d;transition:.42s;cursor:pointer}
.flip.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:24px;backface-visibility:hidden;-webkit-backface-visibility:hidden;padding:clamp(14px,2.5vw,24px);box-shadow:var(--shadow);overflow:hidden}
.front{background:linear-gradient(135deg,#fff8d4,#fff0a3);border:2px solid rgba(222,185,25,.38);display:flex;flex-direction:column;justify-content:center;align-items:center}
.back{background:linear-gradient(135deg,#eaf6ff,#d9efff);border:2px solid rgba(65,165,234,.35);transform:rotateY(180deg);display:flex;flex-direction:column;justify-content:center;align-items:center}
.faceTop{position:absolute;top:clamp(14px,2vw,24px);left:clamp(14px,2vw,24px);right:clamp(14px,2vw,24px);display:flex;justify-content:space-between;color:var(--muted);font-weight:950;letter-spacing:.08em;text-transform:uppercase;font-size:12px}
.badge{background:rgba(255,255,255,.55);border-radius:999px;padding:7px 11px}
.term{font:950 clamp(34px,6vw,62px)/1 Georgia,serif;letter-spacing:-.055em;text-align:center;margin:0}
.chunk{display:block;width:max-content;max-width:100%;margin:clamp(10px,2vh,16px) auto 0;background:rgba(255,255,255,.55);border-radius:10px;padding:8px 12px;color:#625b4d;font-weight:850;text-align:center;font-size:clamp(12px,1.8vw,15px)}
.frontExample{display:none}
.translation{font:950 clamp(27px,6vw,50px)/1.08 Georgia,serif;text-align:center;margin:0 0 14px;color:var(--pink)}
.example{font-size:clamp(15px,2vw,20px);line-height:1.42;text-align:center;color:#47413a;font-style:italic;max-width:740px}
.hint{position:absolute;right:18px;bottom:14px;color:var(--muted);font-weight:850;font-size:13px}

.learn,.nav{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{border:1px solid #e4dacb;border-radius:15px;padding:clamp(9px,1.7vh,14px) 6px;font-size:clamp(14px,2vw,17px);font-weight:950;cursor:pointer;background:#fff;box-shadow:0 7px 15px rgba(23,18,15,.05);color:var(--ink);white-space:nowrap;min-width:0}
.btn.red{background:#fff1f3;color:var(--red);border:1px solid #efb9c2}
.btn.green{background:#e8f7e8;color:var(--green);border:1px solid #b8e2c2}
.btn.yellow{background:var(--yellow);border:1px solid #d9b900} .btn.blue{background:var(--blue);color:#fff}

.quizPanel.active{grid-template-rows:auto auto 1fr}
.quizBox{background:#fff;border:1px solid #eee8de;border-radius:22px;padding:clamp(16px,2.3vw,26px);box-shadow:var(--shadow);min-height:0;display:grid;grid-template-rows:auto auto auto auto;gap:clamp(8px,1.4vh,16px)}
.quizTitle{font:950 clamp(20px,2.8vw,30px)/1 Georgia,serif;color:var(--red);margin:0}
.wordBank{display:none}
.sentence{font:400 clamp(22px,3.2vw,36px)/1.35 Georgia,serif;margin:0}
.blank{display:inline-block;min-width:95px;border-bottom:3px solid var(--ink);height:1em}
.opts{display:flex;flex-wrap:wrap;gap:8px}
.opt{border:0;background:#fff9e1;border:2px solid rgba(255,216,46,.62);border-radius:999px;padding:9px 14px;font-weight:950;font-size:clamp(14px,1.8vw,16px);cursor:pointer}
.opt.ok{background:#ebf9df;border-color:#87cb65}
.opt.no{background:#fff1f3;border-color:#e89ba6}
.opt:disabled{opacity:.95}
.feedback{font-weight:950;color:var(--muted);min-height:20px}
.quizControls{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.listPanel.active{grid-template-rows:1fr}
.list{background:#fff;border:1px solid #eee8de;border-radius:22px;padding:16px 22px;box-shadow:var(--shadow);overflow:auto}
.item{padding:13px 0;border-bottom:1px solid var(--line)} .item:last-child{border:0}
.itemHeader{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.itemTerm{font:950 24px Georgia,serif;color:#fff;background:var(--pink);border-radius:10px;padding:2px 10px}
.itemPos{font-weight:950;border:1px dashed #d7c56a;background:#fff9d2;border-radius:10px;padding:4px 8px;color:#6f6534;text-transform:uppercase;font-size:11px;letter-spacing:.08em}
.item p{margin:5px 0;font-size:16px;line-height:1.35}

.exportPanel.active{grid-template-rows:1fr}
.exportBox{background:#fff;border:1px solid #eee8de;border-radius:22px;padding:18px 22px;box-shadow:var(--shadow);display:grid;grid-template-rows:auto 1fr auto;gap:10px;min-height:0}
.exportBox h2{font:950 38px Georgia,serif;margin:0}
.exportText{width:100%;height:100%;min-height:120px;border:1px solid var(--line);border-radius:16px;background:#fffdf7;padding:12px;font:14px/1.35 ui-monospace,SFMono-Regular,Menlo,monospace;resize:none}
.exportGrid{display:grid;gap:8px}

.footer{display:flex;justify-content:center;gap:4px;align-items:center;flex-direction:column}
.footerTitle{text-align:center;color:var(--muted);font-weight:950;font-size:13px}
.socialRow{display:flex;gap:14px}
.social{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;font-weight:950;box-shadow:0 8px 18px rgba(23,18,15,.14)}
.social svg{width:26px;height:26px;display:block}
.tg{background:#2AABEE} .tg svg{width:18px;height:18px;transform:translateX(-1px)}
.ig{background:radial-gradient(circle at 30% 107%,#fdf497 0%,#fdf497 5%,#fd5949 45%,#d6249f 60%,#285AEB 90%)}
.th{background:#111}

.finish{text-align:center;align-content:center;display:grid;gap:14px}
.finish h2{font:950 clamp(34px,6vw,58px)/1 Georgia,serif;color:var(--pink);margin:0}
.finish p{font-weight:900;color:var(--muted);font-size:20px;margin:0}

@media(max-width:560px){
  .app{padding:8px 10px 12px;gap:5px}
  h1{font-size:29px} .topic{font-size:20px} .dots i{width:16px;height:16px}
  .meta{font-size:12px} .tabs{gap:5px} .tab{padding:8px 3px}
  .counter{min-height:49px} .counter b{font-size:22px}
  .flip{min-height:0;height:88%}
  .term{font-size:36px}
  .chunk{font-size:12px;margin-top:12px}
  .frontExample{font-size:13px;margin-top:10px}
  .translation{font-size:29px}
  .example{font-size:14px}
  .face{border-radius:20px}
  .btn{font-size:14px;padding:9px 4px}
  .quizBox{border-radius:20px;padding:14px}
  .quizTitle{font-size:30px}
  .sentence{font-size:24px}.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}.opt{width:100%;text-align:center;padding:10px 6px}
  .blank{min-width:76px}
  .footerTitle{font-size:12px}
  .social{width:40px;height:40px} .social svg{width:23px;height:23px} .tg svg{width:17px;height:17px}
}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <div><h1>Bogdano Italiano<br>cards</h1><div class="topic">Verbi in cucina</div></div>
    <div class="dots"><i></i><i></i><i></i></div>

  <div class="meta"><span id="metaWords"></span><span id="metaQuiz"></span></div>
  <nav class="tabs">
    <button class="tab active" data-tab="cards">Carte</button>
    <button class="tab" data-tab="quiz">Quiz</button>
    <button class="tab" data-tab="list">Lista</button>
    <button class="tab" data-tab="stats">Statistiche</button>

  <section class="panel active" id="cardsPanel">
    <div class="progress"><div id="cardBar"></div></div>
    <div class="counters">
      <button class="counter active" id="filterNew"><b id="newCount">20</b><span>Nuove</span></button>
      <button class="counter" id="filterKnown"><b id="knownCount">0</b><span>So</span></button>
      <button class="counter" id="filterReview"><b id="reviewCount">0</b><span>Ripasso</span></button>
    </div>
    <div class="stage">
      <article class="flip" id="flipCard">
        <div class="face front">
          <div class="faceTop"><span id="cardNum">01</span><span class="badge">VERBO</span></div>

          <div class="frontExample" id="frontExample"></div>
          <div class="hint">gira la carta</div>

        <div class="face back">

          <div class="translation" id="translation"></div>
          <div class="example" id="example"></div>
          <div class="hint">gira la carta</div>
        </div>

    </div>
    <div class="learn"><button class="btn red" id="markReview">Da ripassare</button><button class="btn green" id="markKnown">Lo so</button></div>
    <div class="nav"><button class="btn" id="prevCard">← Indietro</button><button class="btn" id="nextCard">Avanti →</button></div>
  </section>

  <section class="panel quizPanel" id="quizPanel">
    <div class="progress"><div id="quizBar"></div></div>
    <div class="quizBox" id="quizBox">
      <h2 class="quizTitle">Completa la frase</h2>
      <div class="sentence" id="sentence"></div>
      <div class="opts" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="quizControls"><button class="btn" id="prevQuiz">← Indietro</button><button class="btn yellow" id="nextQuiz">Avanti →</button></div>
    </div>
  </section>

  <section class="panel listPanel" id="listPanel"><div class="list" id="listBox"></div></section>

  <section class="panel exportPanel" id="exportPanel"><div class="exportBox">
    <h2>Export</h2>
    <textarea class="exportText" id="exportText" readonly></textarea>
    <div class="exportGrid">
      <button class="btn yellow" id="copyQuizlet">Copia per Quizlet</button>
      <button class="btn blue" id="downloadAnki">Scarica Anki .txt</button>
      <button class="btn" id="downloadCsv">Scarica CSV</button>
    </div>
  </div></section>

  <section class="panel exportPanel" id="statsPanel"><div class="exportBox">
    <h2>Statistiche</h2>
    <div class="list" id="statsBox"></div>
    <button class="btn red" id="resetAll">Ricomincia tutto</button>
  </div></section>

  <footer class="footer">
    <div class="footerTitle">Seguimi sui social</div>
    <div class="socialRow">
      <a class="social tg" href="https://t.me/shutkin_bogdan" target="_blank" aria-label="Telegram"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.9 15.7 9.5 21c.6 0 .9-.3 1.2-.6l2.9-2.8 6 4.4c1.1.6 1.9.3 2.2-1l4-18.5c.4-1.5-.5-2.1-1.6-1.7L1.3 9.6C-.2 10.2-.2 11 .9 11.3l5.8 1.8L20.3 4.6c.6-.4 1.2-.2.7.2z"/></svg></a>
      <a class="social ig" href="https://instagram.com/shutkin_bogdan" target="_blank" aria-label="Instagram"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg></a>
      <a class="social th" href="https://threads.net/@shutkin_bogdan" target="_blank" aria-label="Threads"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.3 11.1c-.2-3.1-1.9-4.8-4.9-4.8-2 0-3.6.9-4.5 2.5l1.9 1.3c.6-1 1.4-1.5 2.6-1.5 1.6 0 2.5.8 2.7 2.5-1-.2-2-.2-3-.1-2.8.2-4.6 1.6-4.5 3.8.1 2.1 1.9 3.5 4.4 3.4 3.2-.2 5-2 5.3-4.8 1.2.7 1.9 1.7 1.9 3 0 2.5-2.5 4.3-6.5 4.4-4.8.1-7.8-2.9-7.9-7.7C4.7 8 7.7 4.9 12 4.8c3.1 0 5.5 1.4 6.8 4l2.1-1.1C19.1 4.2 16 2.4 12 2.4 6.3 2.5 2.3 6.6 2.4 12.9c.1 6 4.1 10.2 10.3 10 5.3-.1 8.9-2.7 8.9-6.5 0-2.5-1.6-4.4-4.3-5.3zm-5.5 4.8c-1.1.1-1.9-.4-1.9-1.2 0-.8.9-1.3 2.3-1.4.9-.1 1.8 0 2.7.2-.3 1.4-1.3 2.3-3.1 2.4z"/></svg></a>

</main>

"friggere le patate / friggere in padella", "example": "Oggi voglio friggere le patate nell'olio."}, {"term": "arrostire", "translation": "запекать; жарить", "chunk": "arrostire il pollo / verdure arrosto", "example": "Per cena possiamo arrostire il pollo."}, {"term": "infornare", "translation": "ставить в духовку", "chunk": "infornare la pizza / infornare una torta", "example": "Il forno è caldo: possiamo infornare la pizza."}, {"term": "condire", "translation": "заправлять; приправлять", "chunk": "condire l'insalata / condire la pasta", "example": "Devi condire l'insalata prima di servirla."}, {"term": "assaggiare", "translation": "пробовать на вкус", "chunk": "assaggiare il sugo / assaggiare un piatto", "example": "Vuoi assaggiare il sugo?"}, {"term": "impastare", "translation": "замешивать тесто", "chunk": "impastare la pizza / impastare il pane", "example": "Per fare il pane bisogna impastare farina, acqua e lievito."}, {"term": "grattugiare", "translation": "натирать", "chunk": "grattugiare il formaggio / grattugiare la carota", "example": "Devi grattugiare il parmigiano sulla pasta."}, {"term": "tritare", "translation": "измельчать; мелко резать", "chunk": "tritare la cipolla / tritare il prezzemolo", "example": "Per il soffritto devi tritare la cipolla molto finemente."}];
const quiz = [{"answer": "cucino", "sentence": "Quando ho ospiti a casa, _____ volentieri.", "options": ["cucino", "taglio", "bollo", "condisco"]}, {"answer": "cucina", "sentence": "La domenica mia nonna _____ per tutta la famiglia.", "options": ["cucina", "versa", "sbuccia", "grattugia"]}, {"answer": "preparo", "sentence": "Stasera _____ la cena per gli amici.", "options": ["preparo", "lavo", "bollo", "trito"]}, {"answer": "prepara", "sentence": "Marta _____ il pranzo per domani.", "options": ["prepara", "versa", "affetta", "frigge"]}, {"answer": "tagliare", "sentence": "Puoi _____ il pane per tutti?", "options": ["tagliare", "cuocere", "condire", "bollire"]}, {"answer": "taglio", "sentence": "Con questo coltello _____ la zucca.", "options": ["taglio", "verso", "assaggio", "cuocio"]}, {"answer": "affetta", "sentence": "Il salumiere _____ il prosciutto molto sottile.", "options": ["affetta", "lava", "bolle", "impasta"]}, {"answer": "affetto", "sentence": "Per l'antipasto _____ la mozzarella.", "options": ["affetto", "verso", "cuocio", "condisco"]}, {"answer": "sbuccio", "sentence": "Per il purè _____ le patate.", "options": ["sbuccio", "verso", "mescolo", "friggo"]}, {"answer": "sbuccia", "sentence": "Prima di darla al bambino, Luca _____ la mela.", "options": ["sbuccia", "arrostisce", "aggiunge", "mescola"]}, {"answer": "lavo", "sentence": "Prima di mangiarla, _____ l'insalata.", "options": ["lavo", "inforno", "grattugio", "friggo"]}, {"answer": "lavare", "sentence": "Ricordati di _____ la frutta.", "options": ["lavare", "arrostire", "impastare", "cuocere"]}, {"answer": "aggiungo", "sentence": "Alla fine _____ un po' di sale.", "options": ["aggiungo", "lavo", "affetto", "arrostisco"]}, {"answer": "aggiunge", "sentence": "Marco _____ un cucchiaio d'olio alla zuppa.", "options": ["aggiunge", "sbuccia", "trita", "inforna"]}, {"answer": "mescolo", "sentence": "Per ottenere una salsa uniforme, _____ bene.", "options": ["mescolo", "taglio", "bollo", "grattugio"]}, {"answer": "mescolare", "sentence": "Puoi _____ gli ingredienti nella ciotola?", "options": ["mescolare", "lavare", "affettare", "friggere"]}, {"answer": "metto", "sentence": "Prima di cena _____ i piatti sul tavolo.", "options": ["metto", "cuocio", "trito", "bollo"]}, {"answer": "mette", "sentence": "Anna _____ il formaggio nel frigorifero.", "options": ["mette", "versa", "arrostisce", "impasta"]}, {"answer": "verso", "sentence": "A colazione _____ il latte nel bicchiere.", "options": ["verso", "taglio", "sbuccio", "grattugio"]}, {"answer": "versare", "sentence": "Puoi _____ l'acqua nella pentola?", "options": ["versare", "affettare", "friggere", "condire"]}, {"answer": "cuoce", "sentence": "Il riso _____ ancora qualche minuto.", "options": ["cuoce", "lava", "taglia", "versa"]}, {"answer": "cuoce", "sentence": "Questa carne _____ lentamente.", "options": ["cuoce", "sbuccia", "aggiunge", "impasta"]}, {"answer": "bolle", "sentence": "L'acqua _____ già: mettiamo la pasta.", "options": ["bolle", "taglia", "condisce", "trita"]}, {"answer": "bollono", "sentence": "Le patate _____ per venti minuti.", "options": ["bollono", "grattugiano", "versano", "affettano"]}, {"answer": "friggo", "sentence": "Oggi _____ le patate nell'olio.", "options": ["friggo", "lavo", "sbuccio", "mescolo"]}, {"answer": "frigge", "sentence": "Giulia non _____ mai il pesce.", "options": ["frigge", "impasta", "versa", "taglia"]}, {"answer": "arrostiamo", "sentence": "Per cena _____ il pollo.", "options": ["arrostiamo", "laviamo", "grattugiamo", "versiamo"]}, {"answer": "arrostisco", "sentence": "Nel forno _____ spesso le verdure.", "options": ["arrostisco", "sbuccio", "aggiungo", "mescolo"]}, {"answer": "inforniamo", "sentence": "Il forno è caldo: _____ la pizza.", "options": ["inforniamo", "laviamo", "affettiamo", "versiamo"]}, {"answer": "inforno", "sentence": "Adesso _____ la torta.", "options": ["inforno", "trito", "condisco", "bollo"]}, {"answer": "condisco", "sentence": "A pranzo _____ la pasta con il pesto.", "options": ["condisco", "impasto", "cuocio", "sbuccio"]}, {"answer": "condisce", "sentence": "Luca _____ la pasta con il pesto.", "options": ["condisce", "lava", "versa", "trita"]}, {"answer": "assaggio", "sentence": "Prima di servire, _____ il sugo.", "options": ["assaggio", "inforno", "grattugio", "sbuccio"]}, {"answer": "assaggia", "sentence": "Lo chef _____ il piatto prima di servirlo.", "options": ["assaggia", "bolle", "affetta", "mette"]}, {"answer": "impasto", "sentence": "Per fare il pane _____ farina, acqua e lievito.", "options": ["impasto", "grattugio", "friggo", "verso"]}, {"answer": "impasta", "sentence": "Mio padre _____ a mano la pasta fresca.", "options": ["impasta", "lava", "bolle", "affetta"]}, {"answer": "grattugio", "sentence": "Sulla pasta _____ il parmigiano.", "options": ["grattugio", "verso", "sbuccio", "cuocio"]}, {"answer": "grattugiamo", "sentence": "Sul dolce _____ un po' di cioccolato.", "options": ["grattugiamo", "tagliamo", "bolliamo", "arrostiamo"]}, {"answer": "trito", "sentence": "Per il soffritto _____ la cipolla molto finemente.", "options": ["trito", "verso", "inforno", "condisco"]}, {"answer": "trito", "sentence": "Per la salsa _____ il prezzemolo.", "options": ["trito", "friggo", "inforno", "condisco"]}];
const STORAGE_KEY='bogdano_italiano_cards_verbi_cucina_v1';
const $=(id)=>document.getElementById(id);
let cardIndex=0, filter='new', flipped=false;
let known=new Set(), review=new Set();
let quizIndex=0, quizOrder=shuffleArray(quiz.map((_,i)=>i)), answered=new Map(), optionOrder=new Map(), right=0, wrong=0, quizFinished=false;
let lastQuizScore=null;

function loadProgress(){
  try{
    const data=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    known=new Set(data.known||[]);
    review=new Set(data.review||[]);
    lastQuizScore=data.lastQuizScore||null;
  }catch(e){}
}
function saveProgress(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify({known:[...known],review:[...review],lastQuizScore}));
}
function visibleCards(){
  if(filter==='known') return cards.filter(c=>known.has(c.term));
  if(filter==='review') return cards.filter(c=>review.has(c.term));
  return cards.filter(c=>!known.has(c.term)&&!review.has(c.term));
}
function updateCounts(){
  $('newCount').textContent=cards.filter(c=>!known.has(c.term)&&!review.has(c.term)).length;
  $('knownCount').textContent=known.size;
  $('reviewCount').textContent=review.size;
  $('metaWords').textContent=cards.length+' parole';
  $('metaQuiz').textContent=quiz.length+' quiz';
}
function showTab(tab){
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  $(tab+'Panel').classList.add('active');
  if(tab==='quiz') renderQuiz();
  if(tab==='list') renderList();
  if(tab==='export') renderExport();
  if(tab==='stats') renderStats();
}
function setFilter(f){
  filter=f; cardIndex=0; flipped=false;
  document.querySelectorAll('.counter').forEach(b=>b.classList.remove('active'));
  $('filter'+(f==='new'?'New':f==='known'?'Known':'Review')).classList.add('active');
  renderCard();
}
function renderCard(){
  updateCounts();
  const arr=visibleCards();
  if(!arr.length){
    $('cardBar').style.width='0%';
    $('cardNum').textContent='—';
    $('term').textContent=filter==='new'?'Tutto fatto!':filter==='review'?'Niente da ripassare':'Niente qui';
    $('chunk').textContent=''; $('frontExample').textContent=''; $('translation').textContent=''; $('example').textContent='';
    $('flipCard').classList.remove('flipped');
    return;
  }
  if(cardIndex>=arr.length) cardIndex=0;
  const c=arr[cardIndex];
  $('cardBar').style.width=Math.round((cardIndex+1)/arr.length*100)+'%';
  $('cardNum').textContent=String(cardIndex+1).padStart(2,'0');
  $('term').textContent=c.term;
  $('chunk').textContent=c.chunk;
  $('frontExample').textContent='';
  $('translation').textContent=c.translation;
  $('example').textContent='“'+c.example+'”';
  $('flipCard').classList.toggle('flipped',flipped);
}
function moveCard(d){
  const arr=visibleCards();
  if(!arr.length) return renderCard();
  cardIndex=(cardIndex+d+arr.length)%arr.length;
  flipped=false; renderCard();
}
function mark(type){
  const arr=visibleCards();
  if(!arr.length) return;
  const c=arr[cardIndex];
  if(type==='known'){ known.add(c.term); review.delete(c.term); }
  else { review.add(c.term); known.delete(c.term); }
  saveProgress(); moveCard(1);
}
function renderList(){
  $('listBox').innerHTML=cards.map(c=>`<div class="item"><div class="itemHeader"><span class="itemTerm">${escapeHtml(c.term)}</span><span class="itemPos">VERBO</span></div><p><b>${escapeHtml(c.translation)}</b></p><p><em>${escapeHtml(c.example)}</em></p><p>${escapeHtml(c.chunk)}</p></div>`).join('');
}

function renderQuiz(){
  if(quizFinished) return finishQuiz();
  const real=quizOrder[quizIndex], q=quiz[real], saved=answered.get(real);
  $('quizBar').style.width=Math.round((quizIndex+1)/quizOrder.length*100)+'%';
  $('sentence').innerHTML=escapeHtml(q.sentence).replace('_____','<span class="blank"></span>');
  $('feedback').textContent=`${quizIndex+1} / ${quizOrder.length} · giuste: ${right} · errori: ${wrong}`;
  $('options').innerHTML='';
  if(!optionOrder.has(real)) optionOrder.set(real, shuffleArray([...q.options]));
  optionOrder.get(real).forEach(opt=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=opt;
    b.onclick=()=>answerQuiz(opt,q.answer,real);
    if(saved){
      b.disabled=true;
      if(opt===q.answer) b.classList.add('ok');
      if(opt===saved.choice && !saved.ok) b.classList.add('no');
    }
    $('options').appendChild(b);
  });
  if(saved) $('feedback').textContent=saved.ok?'Risposta corretta':'Risposta giusta: '+q.answer;
  $('nextQuiz').textContent=saved?'Avanti →':'Saltare →';
}
function answerQuiz(opt,answer,real){
  if(answered.has(real)) return;
  const ok=opt===answer;
  answered.set(real,{ok,choice:opt});
  if(ok) right++; else wrong++;
  renderQuiz();
  setTimeout(nextQuiz,1500);
}
function nextQuiz(){
  const real=quizOrder[quizIndex];
  if(!answered.has(real)){
    const skipped=quizOrder.splice(quizIndex,1)[0];
    quizOrder.push(skipped);
    if(quizIndex>=quizOrder.length) quizIndex=quizOrder.length-1;
    renderQuiz(); return;
  }
  if(quizIndex<quizOrder.length-1){ quizIndex++; renderQuiz(); }
  else { quizFinished=true; finishQuiz(); }
}
function prevQuiz(){ if(quizIndex>0){ quizIndex--; renderQuiz(); } }
function finishQuiz(){
  $('quizBar').style.width='100%';
  lastQuizScore={right,total:quiz.length,percent:Math.round((right/quiz.length)*100)};
  saveProgress();
  $('quizBox').innerHTML=`<div class="finish"><h2>Complimenti!</h2><p>Hai completato il quiz.</p><p>Risposte corrette: <b>${right}</b> / <b>${quiz.length}</b></p><p>Percentuale: <b>${lastQuizScore.percent}%</b></p><button class="btn yellow" onclick="restartQuiz()">Ricomincia il quiz</button></div>`;
}
function restartQuiz(){
  quizIndex=0; quizOrder=shuffleArray(quiz.map((_,i)=>i)); answered=new Map(); optionOrder=new Map(); right=0; wrong=0; quizFinished=false;
  $('quizBox').innerHTML=`<h2 class="quizTitle">Completa la frase</h2><div class="sentence" id="sentence"></div><div class="opts" id="options"></div><div class="feedback" id="feedback"></div><div class="quizControls"><button class="btn" id="prevQuiz">← Indietro</button><button class="btn yellow" id="nextQuiz">Avanti →</button></div>`;
  bindQuizButtons(); renderQuiz();
}

function renderExport(){
  $('exportText').value=quizletText();
}
function quizletText(){
  return cards.map(c=>`${c.term}\t${c.translation} — ${c.example}`).join('\n');
}
function exportData(type){
  if(type==='quizlet'){
    navigator.clipboard?.writeText(quizletText());
    $('copyQuizlet').textContent='Copiato!';
    setTimeout(()=>$('copyQuizlet').textContent='Copia per Quizlet',1200);
  }
  if(type==='anki') download('bogdano-italiano-cards-anki.txt', cards.map(c=>`${c.term}\t${c.translation}\t${c.example}\t${c.chunk}`).join('\n'));
  if(type==='csv') download('bogdano-italiano-cards.csv', ['term,translation,example,chunk',...cards.map(c=>[c.term,c.translation,c.example,c.chunk].map(x=>'"'+String(x).replaceAll('"','""')+'"').join(','))].join('\n'));
}
function renderStats(){
  const newWords=cards.filter(c=>!known.has(c.term)&&!review.has(c.term)).length;
  const completed=Math.round(((known.size+review.size)/cards.length)*100);
  $('statsBox').innerHTML=`<div class="item"><p><b>Parole totali:</b> ${cards.length}</p><p><b>Nuove:</b> ${newWords}</p><p><b>So:</b> ${known.size}</p><p><b>Da ripassare:</b> ${review.size}</p><p><b>Completamento:</b> ${completed}%</p>${lastQuizScore?`<p><b>Ultimo quiz:</b> ${lastQuizScore.right}/${lastQuizScore.total} (${lastQuizScore.percent}%)</p>`:''}</div>`;
}
function resetAll(){
  known=new Set(); review=new Set(); lastQuizScore=null; saveProgress(); setFilter('new'); renderStats();
}
function download(name,text){
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),800);
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function bindQuizButtons(){ $('prevQuiz').onclick=prevQuiz; $('nextQuiz').onclick=nextQuiz; }

document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));
$('flipCard').onclick=()=>{flipped=!flipped;renderCard();};
$('prevCard').onclick=()=>moveCard(-1); $('nextCard').onclick=()=>moveCard(1);
$('markKnown').onclick=()=>mark('known'); $('markReview').onclick=()=>mark('review');
$('filterNew').onclick=()=>setFilter('new'); $('filterKnown').onclick=()=>setFilter('known'); $('filterReview').onclick=()=>setFilter('review');
$('copyQuizlet').onclick=()=>exportData('quizlet'); $('downloadAnki').onclick=()=>exportData('anki'); $('downloadCsv').onclick=()=>exportData('csv');
$('resetAll').onclick=resetAll;
bindQuizButtons(); loadProgress(); updateCounts(); renderCard();
</script>
</body>
